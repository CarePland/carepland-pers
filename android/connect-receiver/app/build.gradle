plugins {
    id "com.android.application"
}

android {
    namespace "com.carepland.connectreceiver"
    compileSdk 36

    defaultConfig {
        applicationId "com.carepland.connectreceiver"
        minSdk 24
        targetSdk 36
        versionCode 10
        versionName "0.1.9"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
