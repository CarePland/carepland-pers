<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CarePland is offline</title>
    <meta name="theme-color" content="#254a6d" />
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;
        background: #f7fbff;
        color: #172f49;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
      }

      .fallback {
        align-items: center;
        display: flex;
        min-height: 100vh;
        padding: 24px;
      }

      .fallback-content {
        margin: 0 auto;
        max-width: 620px;
        width: 100%;
      }

      .fallback img {
        display: block;
        height: auto;
        margin-bottom: 28px;
        width: 190px;
      }

      .fallback h1 {
        font-size: clamp(2rem, 7vw, 3.7rem);
        line-height: 1;
        margin: 0 0 18px;
      }

      .fallback p {
        color: #345d83;
        font-size: 1.1rem;
        line-height: 1.55;
        margin: 0 0 24px;
      }

      .offline-snapshot-notice {
        align-items: center;
        background: #172f49;
        color: white;
        display: flex;
        flex-wrap: wrap;
        gap: 10px 16px;
        justify-content: center;
        padding: 10px 16px;
        position: sticky;
        text-align: center;
        top: 0;
        z-index: 2147483647;
      }

      .offline-snapshot-notice strong {
        font-size: 0.84rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .offline-snapshot-notice span {
        color: #dcecf8;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .offline-snapshot-root {
        user-select: text;
      }

      .offline-snapshot-root :is(button, input, textarea, select) {
        cursor: default !important;
      }

      button {
        appearance: none;
        background: #254a6d;
        border: 0;
        border-radius: 8px;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        min-height: 48px;
        padding: 0 22px;
      }

      button:focus-visible {
        outline: 3px solid #85a9cc;
        outline-offset: 3px;
      }

      .reconnect-status {
        color: #5f7f9d;
        font-size: 0.95rem;
        font-weight: 700;
        margin-top: 14px;
      }
    </style>
  </head>
  <body>
    <div id="offline-root">
      <main class="fallback">
        <section class="fallback-content">
          <img src="/carepland-logo.png" alt="CarePland" />
          <h1>CarePland needs to connect to continue.</h1>
          <p>
            CarePland cannot reach the internet right now. Recent frozen views
            are available only while this device's offline access is current.
            Older information needs a fresh connection before CarePland can
            continue.
          </p>
          <button id="reconnect-now" type="button">Try again now</button>
          <p class="reconnect-status" id="reconnect-status">
            CarePland will keep trying automatically.
          </p>
        </section>
      </main>
    </div>
    <script>
      (function () {
        var snapshotStorageKey = "carepland-offline-visible-snapshot:v1";
        var root = document.getElementById("offline-root");
        var reconnectTimer = 0;
        var reconnectAttempts = 0;
        var reconnectInFlight = false;
        var retryDelays = [1000, 1500, 2500, 4000, 6000, 8000];

        function formatTimestamp(value) {
          try {
            return new Intl.DateTimeFormat(undefined, {
              dateStyle: "medium",
              timeStyle: "short"
            }).format(new Date(value));
          } catch (error) {
            return new Date(value).toLocaleString();
          }
        }

        function renderFallback() {
          if (root) root.hidden = false;
          startReconnectLoop();
        }

        function reconnectStatusElement() {
          return document.getElementById("reconnect-status");
        }

        function reconnectButtonElement() {
          return document.getElementById("reconnect-now");
        }

        function updateReconnectStatus(message) {
          var statusElement = reconnectStatusElement();
          if (statusElement) statusElement.textContent = message;
        }

        function nextReconnectDelay() {
          return retryDelays[
            Math.min(reconnectAttempts, retryDelays.length - 1)
          ];
        }

        function scheduleReconnectProbe(delay) {
          window.clearTimeout(reconnectTimer);
          reconnectTimer = window.setTimeout(probeReconnect, delay);
        }

        function startReconnectLoop() {
          var button = reconnectButtonElement();
          if (button && !button.getAttribute("data-reconnect-bound")) {
            button.setAttribute("data-reconnect-bound", "true");
            button.addEventListener("click", function () {
              reconnectAttempts = 0;
              probeReconnect();
            });
          }

          scheduleReconnectProbe(800);
        }

        function probeReconnect() {
          if (reconnectInFlight) return;

          reconnectInFlight = true;
          updateReconnectStatus("Checking for CarePland...");

          function finishReconnectProbe() {
            reconnectInFlight = false;
          }

          fetch(window.location.href, {
            cache: "no-store",
            credentials: "same-origin",
            headers: {
              Accept: "text/html"
            }
          })
            .then(function (response) {
              var contentType = response.headers.get("content-type") || "";
              if (!response.ok || contentType.indexOf("text/html") === -1) {
                throw new Error("CarePland is not ready yet.");
              }

              updateReconnectStatus("CarePland is back. Reopening...");
              window.location.replace(window.location.href);
            })
            .catch(function () {
              reconnectAttempts += 1;
              updateReconnectStatus("Still reconnecting. CarePland will reopen automatically.");
              scheduleReconnectProbe(nextReconnectDelay());
              finishReconnectProbe();
            })
            .then(function () {
              finishReconnectProbe();
            });
        }

        try {
          var rawSnapshot = window.localStorage.getItem(snapshotStorageKey);
          if (!rawSnapshot) {
            renderFallback();
            return;
          }

          var snapshot = JSON.parse(rawSnapshot);
          var now = Date.now();
          if (
            !snapshot ||
            typeof snapshot.html !== "string" ||
            typeof snapshot.expiresAt !== "number" ||
            snapshot.expiresAt <= now
          ) {
            window.localStorage.removeItem(snapshotStorageKey);
            renderFallback();
            return;
          }

          if (snapshot.title) {
            document.title = snapshot.title + " (offline)";
          }

          if (typeof snapshot.headHtml === "string") {
            document.head.insertAdjacentHTML("beforeend", snapshot.headHtml);
          }

          document.body.innerHTML =
            '<aside class="offline-snapshot-notice" role="status" aria-live="polite">' +
            "<strong>Offline</strong>" +
            "<span>Frozen view from " +
            formatTimestamp(snapshot.capturedAt) +
            ". Actions are paused until CarePland reconnects.</span>" +
            '<button id="reconnect-now" type="button">Try again now</button>' +
            '<span class="reconnect-status" id="reconnect-status">CarePland will keep trying automatically.</span>' +
            "</aside>" +
            '<div class="offline-snapshot-root">' +
            snapshot.html +
            "</div>";

          document.addEventListener(
            "click",
            function (event) {
              var target = event.target;
              if (
                target &&
                target.closest &&
                target.closest("#reconnect-now")
              ) {
                return;
              }

              event.preventDefault();
              event.stopPropagation();
            },
            true
          );
          startReconnectLoop();
        } catch (error) {
          renderFallback();
        }
      })();
    </script>
  </body>
</html>
